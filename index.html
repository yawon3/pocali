      <script>
        /* ==========================================================
          📌 pocalist 메인 스크립트 - 완전 수정 버전
          ========================================================== */

        // IndexedDB 설정
        const DB_NAME = 'pocalistDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'userDataStore';
        let db = null;

        // IndexedDB 초기화
        function initIndexedDB() {
          return new Promise((resolve, reject) => {
            if (db) {
              return resolve(db);
            }

            const request = indexedDB.open(DB_NAME, DB_VERSION);

            request.onerror = (event) => {
              console.error('IndexedDB 열기 실패:', event);
              reject('IndexedDB를 열 수 없습니다.');
            };

            request.onupgradeneeded = (event) => {
              const db = event.target.result;
              if (!db.objectStoreNames.contains(STORE_NAME)) {
                db.createObjectStore(STORE_NAME, { keyPath: 'key' });
                console.log('IndexedDB 스토어 생성 완료');
              }
            };

            request.onsuccess = (event) => {
              db = event.target.result;
              console.log('IndexedDB 연결 성공');
              resolve(db);
            };
          });
        }

        // IndexedDB에 데이터 저장
        function saveToIndexedDB(key, value) {
          return new Promise(async (resolve, reject) => {
            try {
              const db = await initIndexedDB();
              const transaction = db.transaction([STORE_NAME], 'readwrite');
              const store = transaction.objectStore(STORE_NAME);
              
              const request = store.put({ key, value });
              
              request.onsuccess = () => {
                console.log(`IndexedDB에 ${key} 저장 성공`);
                resolve(true);
              };
              
              request.onerror = (event) => {
                console.error(`IndexedDB에 ${key} 저장 실패:`, event);
                reject(event);
              };
            } catch (error) {
              console.error('IndexedDB 저장 중 오류:', error);
              reject(error);
            }
          });
        }

        // IndexedDB에서 데이터 가져오기
        function getFromIndexedDB(key) {
          return new Promise(async (resolve, reject) => {
            try {
              const db = await initIndexedDB();
              const transaction = db.transaction([STORE_NAME], 'readonly');
              const store = transaction.objectStore(STORE_NAME);
              
              const request = store.get(key);
              
              request.onsuccess = () => {
                const result = request.result;
                if (result) {
                  console.log(`IndexedDB에서 ${key} 로드 성공`);
                  resolve(result.value);
                } else {
                  console.log(`IndexedDB에 ${key} 없음`);
                  resolve(null);
                }
              };
              
              request.onerror = (event) => {
                console.error(`IndexedDB에서 ${key} 로드 실패:`, event);
                reject(event);
              };
            } catch (error) {
              console.error('IndexedDB 로드 중 오류:', error);
              reject(error);
            }
          });
        }

        // 쿠키 유틸리티 함수들
        function setCookie(name, value, days) {
          let expires = "";
          if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
          }
          document.cookie = name + "=" + encodeURIComponent(value || "") + expires + "; path=/; SameSite=Strict";
        }

        function getCookie(name) {
          const nameEQ = name + "=";
          const ca = document.cookie.split(';');
          for(let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) == 0) return decodeURIComponent(c.substring(nameEQ.length, c.length));
          }
          return null;
        }

        // UUID 유효성 검사 함수
        function isValidUUID(uuid) {
          if (!uuid) return false;
          // 기본적인 UUID 형식 검사
          const regex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
          return regex.test(uuid.trim());
        }

        // 모든 저장소에 데이터 저장
        async function saveUserData(key, value) {
          const stringValue = typeof value === 'string' ? value : JSON.stringify(value);
          
          try {
            // 1. localStorage에 저장
            localStorage.setItem(key, stringValue);
            
            // 2. 쿠키에 저장 (30일)
            setCookie(key, stringValue, 30);
            
            // 3. IndexedDB에 저장
            await saveToIndexedDB(key, stringValue);
            
            console.log(`${key} 데이터 모든 저장소에 저장 완료`);
            return true;
          } catch (error) {
            console.error(`${key} 데이터 저장 실패:`, error);
            return false;
          }
        }

        // 모든 저장소에서 데이터 가져오기 (우선순위: IndexedDB > localStorage > cookies)
        async function getUserData(key) {
          try {
            // 1. IndexedDB에서 시도
            try {
              const indexedDBValue = await getFromIndexedDB(key);
              if (indexedDBValue) {
                console.log(`IndexedDB에서 ${key} 복구 성공`);
                // 다른 저장소에도 복사
                localStorage.setItem(key, indexedDBValue);
                setCookie(key, indexedDBValue, 30);
                return indexedDBValue;
              }
            } catch (error) {
              console.warn('IndexedDB 조회 실패:', error);
            }
            
            // 2. localStorage에서 시도
            const localValue = localStorage.getItem(key);
            if (localValue) {
              console.log(`localStorage에서 ${key} 복구 성공`);
              // 다른 저장소에 복사
              setCookie(key, localValue, 30);
              try {
                await saveToIndexedDB(key, localValue);
              } catch (error) {
                console.warn('IndexedDB 저장 실패:', error);
              }
              return localValue;
            }
            
            // 3. 쿠키에서 시도
            const cookieValue = getCookie(key);
            if (cookieValue) {
              console.log(`쿠키에서 ${key} 복구 성공`);
              // 다른 저장소에 복사
              localStorage.setItem(key, cookieValue);
              try {
                await saveToIndexedDB(key, cookieValue);
              } catch (error) {
                console.warn('IndexedDB 저장 실패:', error);
              }
              return cookieValue;
            }
            
            console.log(`${key} 데이터 모든 저장소에서 찾을 수 없음`);
            return null;
          } catch (error) {
            console.error(`${key} 데이터 조회 실패:`, error);
            return null;
          }
        }

        // UUID 가져오기
        async function getMyUUID() {
          try {
            const uuid = await getUserData('myUUID');
            if (isValidUUID(uuid)) {
              return uuid;
            }
            return null;
          } catch (error) {
            console.error('UUID 조회 실패:', error);
            return null;
          }
        }

        // 친구 UUID 가져오기
        async function getLastFriendUUID() {
          try {
            return await getUserData('lastFriendUUID');
          } catch (error) {
            console.error('친구 UUID 조회 실패:', error);
            return null;
          }
        }

        // 사용자 데이터 가져오기
        async function getUserDataObj() {
          try {
            const userData = await getUserData('userData');
            if (userData) {
              try {
                return JSON.parse(userData);
              } catch (error) {
                console.error('userData 파싱 실패', error);
                return userData; // 이미 객체일 수도 있음
              }
            }
            return {};
          } catch (error) {
            console.error('사용자 데이터 파싱 실패:', error);
            return {};
          }
        }

        // UUID 확보/생성 함수
        async function ensureMyUUID() {
          try {
            // 저장소에서 UUID 조회
            let uuid = await getMyUUID();
            if (uuid) {
              console.log('기존 UUID 사용:', uuid);
              return uuid;
            }
            
            // 새 UUID 발급
            console.log('새 UUID 발급 요청');
            const response = await fetch('https://pocali-backend.onrender.com/api/register', {
              method: 'POST'
            });
            
            if (!response.ok) {
              throw new Error('UUID 발급 실패');
            }
            
            const data = await response.json();
            uuid = data.user_id;
            
            if (!isValidUUID(uuid)) {
              throw new Error('서버에서 유효하지 않은 UUID 반환');
            }
            
            // 모든 저장소에 저장
            await saveUserData('myUUID', uuid);
            await saveUserData('userData', JSON.stringify({}));
            
            console.log('새 UUID 발급 및 저장 완료:', uuid);
            return uuid;
          } catch (error) {
            console.error('UUID 발급 오류:', error);
            alert('사용자 정보 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.');
            return null;
          }
        }

        // UUID 검증 및 복구
        async function validateUserID() {
          try {
            // 저장소에서 UUID 조회
            const uuid = await getMyUUID();
            
            // UUID가 없거나 유효하지 않으면 초기화
            if (!uuid) {
              console.log('유효한 UUID 없음, 새로 발급');
              return await ensureMyUUID();
            }
            
            // userData 확인 (항상 서버도 한번 확인)
            let localObj = await getUserDataObj();

            try {
              const serverObj = await fetchUserDataFromServer(uuid);

              if (serverObj) {
                const merged = pickNewerUserData(localObj, serverObj);

                // 전역 userData 갱신
                userData = merged;

        // ✅ 서버에서 userData 가져오기 (공용)
        async function fetchUserDataFromServer(uuid) {
          if (!uuid) return null;

          try {
            const r = await fetch(`https://pocali-backend.onrender.com/api/user/${uuid}`);
            if (!r.ok) return null;

            const data = await r.json();

            // data.data가 string(JSON)일 수도, object일 수도
            let serverObj = {};
            if (typeof data.data === 'string') {
              try { serverObj = JSON.parse(data.data); } catch { serverObj = {}; }
            } else {
              serverObj = data.data || {};
            }

            return serverObj;
          } catch (e) {
            console.error('fetchUserDataFromServer 실패:', e);
            return null;
          }
        }

        // ✅ 로컬 vs 서버 중 “최신” 선택 (타임스탬프 있으면 그걸로, 없으면 키 개수로)
        function pickNewerUserData(localObj = {}, serverObj = {}) {
          const lts = Number(localObj.__ts || 0);
          const sts = Number(serverObj.__ts || 0);

          if (lts && sts) return (sts >= lts) ? serverObj : localObj;

          // 타임스탬프가 없으면 fallback: 체크 개수 많은 쪽 우선
          const lcount = Object.keys(localObj || {}).length;
          const scount = Object.keys(serverObj || {}).length;
          return (scount >= lcount) ? serverObj : localObj;
        }

          /** 카테고리별 그룹 + 제목 + 버전 헤더 뷰 */
          function showByCategory() {

            originalCards.forEach(div => {
              const img = $('.photo-card', div);
              if (!img) return;

              const key = [
                img.dataset.category || '미분류',
                img.dataset.title || '',
                img.dataset.version || ''
              ].filter(Boolean).join(' | ');

              (buckets[key] = buckets[key] || []).push(div);
            });

            $grid.innerHTML = '';

            Object.entries(buckets)
              .sort(([, a], [, b]) =>
                +$('.photo-card', b[0]).dataset.unique -
                +$('.photo-card', a[0]).dataset.unique

                ).forEach(div => $grid.appendChild(div));

            updateCount();

          /** 현재 필터/뷰 상태로 다시 그리기 */
          function applyFilters() {
            if (currentView === 'category') {
              showByCategory();
            } else {
              showById();
            }
          }

          function applyAllFilters() {
            const q = (filters.text || '').trim().toLowerCase();

            allImages = backupAllImages.filter(meta => {
              const searchableText = [
                meta.group || '',
                meta.member || '',
                meta.category || '',
                meta.title || '',
                meta.version || ''
              ].join(' ').toLowerCase();

              const textMatch =
                !q || searchableText.includes(q);

              const groupMatch =
                filters.groups.length === 0 ||
                filters.groups.includes(meta.group);

              const memberMatch =
                filters.members.length === 0 ||
                filters.members.includes(meta.member);

              return textMatch && groupMatch && memberMatch;
            });

            currentBatch = 0;
            isRendering = false;
            $grid.innerHTML = '';
            updateCount();
            
            if (currentView === 'category') {
              showByCategory();
            } else {
              renderNextBatch();

          }

          // ─── 페이징별 렌더링 함수 ─────────────────────────
          function renderNextBatch() {
            if (isRendering) return;
            
            const start = currentBatch * BATCH_SIZE;
            const end = start + BATCH_SIZE;
            const slice = allImages.slice(start, end);
            
            // 로드할 이미지가 없으면 종료
            if (slice.length === 0) {
              isRendering = false;
              return;
            }
            
            isRendering = true;

            slice.forEach(image => {
              // 1) 카드 컨테이너 생성
              const container = document.createElement('div');
              container.className = 'photo-card-container';

              // 2) <img> 요소 생성
              const img = document.createElement('img');
              img.className = 'photo-card';
              img.src = image.url.startsWith('http')
                        ? image.url
                        : `https://pocali-backend.onrender.com${image.url}`;
              img.loading = 'lazy';
              img.alt = `${image.group} ${image.member} ${image.category} ${image.title} #${image.unique_id}`;
              img.dataset.group = image.group;
              img.dataset.member = image.member;
              img.dataset.category = image.category;
              img.dataset.title = image.title;
              img.dataset.version = image.version;
              img.dataset.unique = image.unique_id;

              // ── 현재 userData에 따른 체크 정보 적용
              if (userData[image.unique_id]) {
                img.classList.add('checked');
              }

              // 포인터 이벤트 설정
              img.style.pointerEvents = viewOwner === 'self' ? '' : 'none';

              // 3) 오버레이: image.type 또는 백엔드 file_type 활용
              const overlay = document.createElement('div');
              overlay.className = 'image-overlay';
              overlay.textContent = image.type || image.file_type || '';
              container.appendChild(overlay);

              // 4) 터치·롱프레스 & 더블클릭 이벤트 바인딩
              let startX, startY;
              let moved = false;
              let startTime, pressTimer;
              
              img.addEventListener('pointerdown', e => {
                if (viewOwner !== 'self') return;
                
                // 시작 위치 기록
                startX = e.clientX;
                startY = e.clientY;
                moved = false;
                
                startTime = performance.now();
                pressTimer = setTimeout(() => showModal(img), LONG_PRESS);
              });

              img.addEventListener('pointermove', e => {
                if (!startX || !startY) return;
                
                // 움직인 거리 계산
                const deltaX = Math.abs(e.clientX - startX);
                const deltaY = Math.abs(e.clientY - startY);
                
                // 일정 거리 이상 움직였으면 스크롤로 간주
                if (deltaX > MOVE_THRESHOLD || deltaY > MOVE_THRESHOLD) {
                  moved = true;
                  clearTimeout(pressTimer); // 롱프레스 타이머 취소
                }
              });

              img.addEventListener('pointerup', e => {
                clearTimeout(pressTimer);
                
                // 스크롤이 아닌 짧은 탭인 경우에만 토글
                if (!moved && (performance.now() - startTime < TAP_THRESHOLD)) {
                  toggleCheck(img);
                }
                
                // 변수 초기화
                startX = startY = null;
                moved = false;
              });

              img.addEventListener('pointerleave', () => {
                clearTimeout(pressTimer);
                startX = startY = null;
                moved = false;
              });

              img.addEventListener('dblclick', () => {
                if (viewOwner !== 'self') return;
                toggleCheck(img);
              });

              img.addEventListener('contextmenu', e => {
                e.preventDefault();
                showModal(img);
              });

              // 5) 그리드에 추가
              container.appendChild(img);
              $grid.appendChild(container);

              // 북마크 URL 생성 (기본 URL + uuid 파라미터)
              const baseUrl = window.location.origin + window.location.pathname;
              const finalUrl = new URL(baseUrl);
              finalUrl.searchParams.set('uuid', uuid);
              
              // 북마크 링크 필드 설정
              document.getElementById('uuid-bookmark-link').value = finalUrl.toString();
              
              // 현재 URL에 UUID 파라미터가 없으면 추가 (페이지 새로고침 없이)
              const currentUrl = new URL(window.location.href);
              if (!currentUrl.searchParams.has('uuid') && history.replaceState) {
                currentUrl.searchParams.set('uuid', uuid);
                history.replaceState(null, null, currentUrl.toString());
              }
              
              return true; // UUID가 있어 모달 표시 가능
              
            } catch (error) {
              console.error('UUID 정보 업데이트 실패:', error);
              return false;
            }
          }

          // 링크 복사 버튼
          document.getElementById('copy-link-btn')?.addEventListener('click', () => {
            const linkInput = document.getElementById('uuid-bookmark-link');
            linkInput.select();
            document.execCommand('copy');
            
            alert('UUID 링크가 클립보드에 복사되었습니다!\n\n이 링크를 북마크하거나 홈 화면에 추가하세요.');
          });

          // 닫기 버튼
          document.getElementById('uuid-guide-close')?.addEventListener('click', () => {
            document.getElementById('uuid-guide-modal').style.display = 'none';
            
            // 다시 보지 않기 옵션 저장
            if (document.getElementById('dont-show-again').checked) {
              try {
                localStorage.setItem('hideUuidGuide', 'true');
                setCookie('hideUuidGuide', 'true', 30);
              } catch (error) {
                console.error('설정 저장 실패:', error);
              }
            }
          });

          // X 버튼
          document.querySelector('#uuid-guide-modal .close')?.addEventListener('click', () => {
            document.getElementById('uuid-guide-modal').style.display = 'none';
          });

          // ================= 중요: UUID 처리 로직 개선 =================
          
          // URL에서 UUID 파라미터 가져오기
          function getUuidFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlUuid = urlParams.get('uuid');
            return isValidUUID(urlUuid) ? urlUuid : null;
          }
          
          // UUID 가져오기 (우선순위: URL > 쿠키 > localStorage)
          async function getMyUUID() {
            // 1. URL에서 UUID 확인 (최우선)
            const urlUuid = getUuidFromUrl();
            if (urlUuid) {
              return urlUuid;
            }
            
            // 2. 쿠키에서 UUID 확인
            const cookieUuid = getCookie('myUUID');
            if (isValidUUID(cookieUuid)) {
              return cookieUuid;
            }
            
            // 3. localStorage에서 UUID 확인
            const localUuid = localStorage.getItem('myUUID');
            if (isValidUUID(localUuid)) {
              return localUuid;
            }
            
            return null;
          }
          
          // URL에서 UUID 확인 및 데이터 로드 (페이지 로드 시 호출)
          async function processUrlUuid() {
            try {
              const urlUuid = getUuidFromUrl();
              if (!urlUuid) return false;
              
              console.log('URL에서 UUID 발견:', urlUuid);
              
              // 현재 저장된 UUID 확인
              const currentUuid = localStorage.getItem('myUUID') || getCookie('myUUID');
              
              // 같은 UUID면 리로드하지 않음
              if (currentUuid === urlUuid) {
                console.log('URL UUID와 현재 UUID가 동일함. 리로드 건너뜀:', urlUuid);
                // 쿠키 동기화만 확인
                if (!getCookie('myUUID')) {
                  setCookie('myUUID', urlUuid, 30);
                }
                const userData = localStorage.getItem('userData');
                if (userData && !getCookie('userData')) {
                  setCookie('userData', userData, 30);
                }
                return true;
              }
              
              // 로컬 저장소를 먼저 확인 (URL의 UUID가 우선)
              const urlUuidLoaded = localStorage.getItem(`uuid_loaded_${urlUuid}`);
              if (urlUuidLoaded === 'true' && currentUuid === urlUuid) {
                console.log('이미 이 UUID로 로드된 적 있음. 데이터 재로드 생략');
                return true;
              }
              
              // 서버에서 데이터 로드
              try {
                console.log('서버에서 데이터 로드 시도:', urlUuid);
                const response = await fetch(`https://pocali-backend.onrender.com/api/user/${urlUuid}`);
                
                if (!response.ok) {
                  console.error('서버 데이터 로드 실패:', await response.text());
                  return false;
                }
                
                const data = await response.json();
                console.log('서버 데이터 로드 성공:', data);
                
                // 기존 UUID와 데이터 백업 (다른 UUID인 경우만)
                const oldUuid = localStorage.getItem('myUUID');
                if (oldUuid && oldUuid !== urlUuid) {
                  // 기존 데이터 백업
                  const oldUserData = localStorage.getItem('userData') || getCookie('userData');
                  if (oldUserData) {
                    localStorage.setItem(`backup_data_${oldUuid}`, oldUserData);
                    console.log('기존 UUID의 데이터 백업:', oldUuid);
                  }
                  localStorage.setItem('previous_uuid', oldUuid);
                  console.log('기존 UUID 백업:', oldUuid);
                }
                
                // 새 UUID와 데이터 저장
                localStorage.setItem('myUUID', urlUuid);
                setCookie('myUUID', urlUuid, 30);
                
                // userData 저장
                const userData = typeof data.data === 'string' ? data.data : JSON.stringify(data.data || {});
                localStorage.setItem('userData', userData);
                setCookie('userData', userData, 30);
                
                // 로드 완료 표시
                localStorage.setItem(`uuid_loaded_${urlUuid}`, 'true');
                
                console.log('새 UUID 적용 완료:', urlUuid);
                
                // UUID 변경 후 즉시 페이지 갱신 (주소는 그대로 유지)
                window.location.reload();
                return true;
              } catch (error) {
                console.error('URL UUID 처리 중 오류:', error);
                return false;
              }
            } catch (error) {
              console.error('URL 파라미터 처리 오류:', error);
              return false;
            }
          }

          // 첫 포토카드 체크 시 UUID 가이드 모달 표시
          function setupCardCheckListener() {
            // iOS 기기인지 확인
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (!isIOS) return; // iOS 기기가 아니면 리스너 설정 안함
            
            // URL에 UUID가 이미 있는지 확인
            const urlHasUuid = getUuidFromUrl() !== null;
            if (urlHasUuid) return; // URL에 UUID가 있으면 리스너 설정 안함
            
            // 원본 toggleCheck 함수 참조 저장
            const originalToggleCheck = window.toggleCheck;
            
            if (typeof originalToggleCheck === 'function') {
              // toggleCheck 함수가 정의되어 있는 경우
              window.toggleCheck = async function(img) {
                // 원래 함수 호출
                originalToggleCheck.apply(this, arguments);
                
                // 첫 체크 감지
                if (!hasCheckedCard) {
                  hasCheckedCard = true;
                  
                  // 다시 보지 않기 설정 확인
                  const hideGuide = localStorage.getItem('hideUuidGuide') || getCookie('hideUuidGuide');
                  if (hideGuide === 'true') return;
                  
                  // 모달 표시 (약간의 지연 후)
                  setTimeout(async () => {
                    if (await updateUuidGuideModal()) {
                      document.getElementById('uuid-guide-modal').style.display = 'block';
                    }
                  }, 500);
                }
              };
            } else {
              // toggleCheck 함수를 찾을 수 없는 경우, 클릭 이벤트 감시
              document.addEventListener('click', async function(e) {
                // 포토카드 클릭 감지
                if (e.target && e.target.classList && e.target.classList.contains('photo-card')) {
                  if (!hasCheckedCard) {
                    hasCheckedCard = true;
                    
                    // 다시 보지 않기 설정 확인
                    const hideGuide = localStorage.getItem('hideUuidGuide') || getCookie('hideUuidGuide');
                    if (hideGuide === 'true') return;
                    
                    // 모달 표시 (약간의 지연 후)
                    setTimeout(async () => {
                      if (await updateUuidGuideModal()) {
                        document.getElementById('uuid-guide-modal').style.display = 'block';
                      }
                    }, 1000);
                  }
                }
              });
            }
          }

          // 페이지 로드 시 실행
          window.addEventListener('load', async () => {
            console.log('POCALIST UUID 헬퍼 로드됨');
            
            // URL UUID 먼저 처리 (최우선)
            const urlProcessed = await processUrlUuid();
            
            // URL에 UUID가 없거나 처리되지 않은 경우에만 카드 체크 리스너 설정
            if (!urlProcessed) {
              setupCardCheckListener();
            }
          });

          // '유저 데이터 불러오기' 버튼에 이벤트 핸들러 추가
          document.getElementById('load-user-data')?.addEventListener('click', async () => {
            // iOS 기기 감지
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
              // '유저 데이터 불러오기' 모달이 닫히면 UUID 안내 모달 표시
              const userDataModal = document.getElementById('user-data-modal');
              
              // 기존 이벤트 리스너는 유지하면서 새 이벤트 리스너 추가
              const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                  if (mutation.attributeName === 'style' && 
                      userDataModal.style.display === 'none') {
                    
                    // 다시 보지 않기 설정 확인
                    const hideGuide = localStorage.getItem('hideUuidGuide') || getCookie('hideUuidGuide');
                    if (hideGuide === 'true') return;
                    
                    // URL에 UUID가 없는 경우에만 모달 표시
                    setTimeout(async () => {
                      const urlHasUuid = getUuidFromUrl() !== null;
                      if (!urlHasUuid && await updateUuidGuideModal()) {
                        document.getElementById('uuid-guide-modal').style.display = 'block';
                      }
                    }, 500);
                    
                    // 한 번만 실행하고 Observer 제거
                    observer.disconnect();
                  }
                });
              });
              
              // userDataModal의 style 속성 변화 감시 시작
              observer.observe(userDataModal, { attributes: true });
            }
          });

    
          // 원래의 ensureMyUUID 함수를 오버라이드하여 URL UUID 처리 개선
          const originalEnsureMyUUID = window.ensureMyUUID;
          
          if (typeof originalEnsureMyUUID === 'function') {
            window.ensureMyUUID = async function() {
              // URL에서 UUID 확인 (최우선)
              const urlUuid = getUuidFromUrl();
              
              if (urlUuid) {
                console.log('ensureMyUUID: URL에서 UUID 사용:', urlUuid);
                return urlUuid;
              }
              
              // URL에 UUID가 없으면 원래 함수 호출
              return await originalEnsureMyUUID.apply(this, arguments);
            };
          }

          // 백업 데이터 목록 표시 및 복구 기능
          function showBackupList() {
            const backupList = document.getElementById('backup-list');
            if (!backupList) return;

            backupList.innerHTML = '';
            
            // localStorage에서 백업 데이터 찾기
            const backups = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (key.startsWith('backup_data_')) {
                const uuid = key.replace('backup_data_', '');
                backups.push(uuid);
              }
            }

            if (backups.length === 0) {
              backupList.innerHTML = '<p style="color: #666; font-size: 0.9em;">백업된 데이터가 없습니다.</p>';
              return;
            }

            // 백업 목록 표시
            backups.forEach(uuid => {
              const div = document.createElement('div');
              div.style.cssText = 'margin: 5px 0; padding: 8px; background: white; border-radius: 3px; display: flex; justify-content: space-between; align-items: center;';
              
              const uuidText = document.createElement('span');
              uuidText.textContent = uuid.substring(0, 8) + '...';
              uuidText.style.cssText = 'font-family: monospace; font-size: 0.9em;';
              
              const restoreBtn = document.createElement('button');
              restoreBtn.textContent = '복구';
              restoreBtn.style.cssText = 'padding: 4px 12px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer;';
              restoreBtn.onclick = () => restoreBackup(uuid);
              
              div.appendChild(uuidText);
              div.appendChild(restoreBtn);
              backupList.appendChild(div);
            });
          }

          // 백업 데이터 복구
          async function restoreBackup(uuid) {
            if (!confirm(`UUID ${uuid.substring(0, 8)}...의 백업 데이터를 복구하시겠습니까?\n\n현재 데이터는 백업됩니다.`)) {
              return;
            }

            try {
              const backupData = localStorage.getItem(`backup_data_${uuid}`);
              if (!backupData) {
                alert('백업 데이터를 찾을 수 없습니다.');
                return;
              }

              // 현재 데이터 백업
              const currentUuid = localStorage.getItem('myUUID');
              const currentData = localStorage.getItem('userData');
              if (currentUuid && currentData) {
                localStorage.setItem(`backup_data_${currentUuid}`, currentData);
              }

              // 백업 데이터 복구
              localStorage.setItem('myUUID', uuid);
              localStorage.setItem('userData', backupData);
              setCookie('myUUID', uuid, 30);
              setCookie('userData', backupData, 30);

              // 복구 완료 표시 제거
              localStorage.removeItem(`backup_data_${uuid}`);

              alert('데이터가 복구되었습니다. 페이지를 새로고침합니다.');
              window.location.reload();
            } catch (error) {
              console.error('백업 복구 중 오류:', error);
              alert('백업 복구 중 오류가 발생했습니다.');
            }
          }

          // 유저 데이터 모달 열릴 때 백업 목록 표시
          const loadUserDataBtn = document.getElementById('load-user-data');
          if (loadUserDataBtn) {
            loadUserDataBtn.addEventListener('click', () => {
              setTimeout(showBackupList, 100);
            });
          }
        })();


      </script>
